spring:
  application:
    name: BackendLearning

  datasource:
    url: jdbc:h2:file:./testdb;DB_CLOSE_ON_EXIT=TRUE;AUTO_SERVER=TRUE
    driverClassName: org.h2.Driver
    username: ""
    password: ""

  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: update

  h2:
    console:
      enabled: true
      path: /h2-console